<div aria-modal="true" class="searchix" role="dialog">
    <div class="searchix__header">
        <svg class="searchix__icon" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
             stroke-width="2" viewBox="0 0 24 24" width="20">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
        </svg>

        <input
            #searchInput
            [formControl]="q"
            [placeholder]="data.config.placeholder || 'Search...'"
            autofocus
            class="searchix__input"
            id="searchix-input"
        />

        <kbd class="searchix__kbd">esc</kbd>
    </div>

    <!-- Empty State -->
    <div *ngIf="displayItems.length === 0; else list" class="searchix__content">
        <div class="searchix__empty">
            <svg
                class="searchix__empty-icon"
                width="48"
                height="48"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <p>{{ isSearchEmpty ? 'No recent searches' : 'No results found' }}</p>
        </div>
    </div>

    <!-- Results List -->
    <ng-template #list>
        <!-- Recent Items Header -->
        <div *ngIf="isShowingRecents" class="searchix__recents-header">
            <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
            >
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Recents</span>
        </div>
        <div #searchList class="searchix__list">
            <!-- Items List -->
            <button
                *ngFor="let it of displayItems; let i = index; trackBy: trackById"
                type="button"
                class="searchix__item"
                id="searchix__item-{{i}}"
                [class.active]="i === activeIndex"
                (click)="select(it)"
            >
                <!-- Item Content -->
                <div class="searchix__item-content">
                    <!-- Icon -->
                    <div *ngIf="it.icon" class="searchix__item-icon">
                        <ng-container *ngIf="data.config.iconRenderer; else defaultIcon">
                            <ng-container *ngTemplateOutlet="data.config.iconRenderer; context: { $implicit: it.icon }"></ng-container>
                        </ng-container>
                        <ng-template #defaultIcon>
                            <svg
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </ng-template>
                    </div>

                    <!-- Text -->
                    <div class="searchix__item-text">
                        <div class="searchix__item-title">{{ it.title }}</div>
                        <div *ngIf="it.subtitle" class="searchix__item-subtitle">{{ it.subtitle }}</div>
                    </div>
                </div>

                <!-- Item Actions -->
                <div class="searchix__item-actions">
                    <!-- Delete Button (only for recent items) -->
                    <button
                        *ngIf="isShowingRecents"
                        type="button"
                        class="searchix__item-delete"
                        title="Remove from recents"
                        (click)="removeRecent($event, it)"
                    >
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>

                    <!-- External Link -->
                    <a
                        *ngIf="it.href"
                        [href]="it.href"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="searchix__item-external"
                        title="Open in new tab"
                        (click)="openExternal($event, it)"
                    >
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                        </svg>
                    </a>
                </div>
            </button>
        </div>
    </ng-template>

    <!-- Footer -->
    <div class="searchix__footer">
        <div class="searchix__footer-info">
            <span *ngIf="data.config.showResultsCount" class="searchix__footer-count">
                {{ (displayItems?.length || 0) }} {{ (displayItems?.length || 0) === 1 ? 'result' : 'results' }}
            </span>
            <span *ngIf="data.config.showMs" class="searchix__footer-time">
                {{ searchMs }}ms
            </span>
        </div>
        <div class="searchix__footer-hints">
            <kbd class="searchix__footer-kbd">
                <svg
                    width="12"
                    height="12"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
                <svg
                    width="12"
                    height="12"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
                navigate
            </kbd>
            <kbd class="searchix__footer-kbd">↵ select</kbd>
        </div>
    </div>
</div>
