<ng-container *ngIf="buttonTemplate; else defaultButton">
  <ng-container *ngTemplateOutlet="buttonTemplate; context: { $implicit: { open: open.bind(this), hotkey: hotkey || defaultConfig?.hotkey || 'Ctrl+K' } }"></ng-container>
</ng-container>

<ng-template #defaultButton>
  <button type="button" class="ngx-searchix-trigger" (click)="open()">
    <ng-container *ngIf="iconTemplate; else defaultSearchIcon">
      <ng-container *ngTemplateOutlet="iconTemplate"></ng-container>
    </ng-container>
    <ng-template #defaultSearchIcon>
      <svg class="ngx-searchix-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
    </ng-template>
    <span class="ngx-searchix-label">{{ (label || 'Lookup') }}</span>
    <code class="ngx-searchix-hint">{{ (hotkey || defaultConfig?.hotkey || 'Ctrl+K') }}</code>
  </button>
</ng-template>
