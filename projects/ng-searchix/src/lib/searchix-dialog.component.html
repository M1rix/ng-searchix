<div class="searchix" role="dialog" aria-modal="true">
    <div class="searchix__header">
        <span class="searchix__icon">🔍</span>

        <input
                class="searchix__input"
                [placeholder]="data.config.placeholder || 'Search...'"
                [formControl]="q"
                autofocus
        />

        <span class="searchix__kbd">esc</span>
    </div>

    <div class="searchix__content" *ngIf="!results.length; else list">
        <div class="searchix__empty">No recent searches</div>
    </div>

    <ng-template #list>
        <div class="searchix__list">
            <button
                    type="button"
                    class="searchix__item"
                    *ngFor="let it of results; let i = index; trackBy: trackById"
                    (click)="select(it)"
                    [class.active]="i === activeIndex"
            >
                <div class="title">{{ it.title }}</div>
                <div class="subtitle" *ngIf="it.subtitle">{{ it.subtitle }}</div>
            </button>
        </div>
    </ng-template>

    <div class="searchix__footer">
        Found <strong>{{ results.length }}</strong> results
        <ng-container *ngIf="data.config.showMs">
            &nbsp;• {{ searchMs }} ms
        </ng-container>
    </div>
</div>
